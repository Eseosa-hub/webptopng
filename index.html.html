<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBP to PNG Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .drag-active { border-color: #4F46E5; background-color: #EEF2FF; }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #4F46E5;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">P</div>
                <h1 class="text-xl font-bold text-slate-800">WEBP to PNG</h1>
            </div>
            <div class="text-sm text-slate-500 hidden sm:block">100% Client-side • No uploads</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto px-4 py-8 w-full">
        
        <!-- Upload Area -->
        <div id="drop-zone" class="border-2 border-dashed border-slate-300 rounded-2xl bg-white p-10 text-center transition-all duration-200 cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/30 relative group">
            <input type="file" id="file-input" accept=".webp,image/webp" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            
            <div class="pointer-events-none">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-slate-700 mb-2">Drop WEBP images here</h3>
                <p class="text-slate-500 mb-4">or click to browse files</p>
                <span class="inline-block px-3 py-1 bg-slate-100 text-slate-500 text-xs rounded-full font-medium">Supports batch conversion</span>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls" class="hidden mt-6 flex flex-col sm:flex-row justify-between items-center gap-4 fade-in">
            <div class="text-sm text-slate-600">
                <span id="file-count">0</span> files selected
            </div>
            <div class="flex gap-3">
                <button id="clear-btn" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                    Clear All
                </button>
                <button id="download-all-btn" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg shadow-sm transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download All (ZIP)
                </button>
            </div>
        </div>

        <!-- Gallery -->
        <div id="gallery" class="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Items will be injected here -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 mt-8">
        <div class="max-w-5xl mx-auto px-4 text-center text-slate-400 text-sm">
            <p>Processing happens locally in your browser. Your images are never uploaded to a server.</p>
        </div>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const gallery = document.getElementById('gallery');
        const controls = document.getElementById('controls');
        const fileCountLabel = document.getElementById('file-count');
        const downloadAllBtn = document.getElementById('download-all-btn');
        const clearBtn = document.getElementById('clear-btn');

        let convertedFiles = [];

        // Drag and Drop Event Listeners
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-active'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-active'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFilesSelect, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFilesSelect(e) {
            const files = e.target.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            const webpFiles = Array.from(files).filter(file => file.type === 'image/webp' || file.name.endsWith('.webp'));
            
            if (webpFiles.length === 0 && files.length > 0) {
                alert('Please select WEBP files only.');
                return;
            }

            if (webpFiles.length > 0) {
                controls.classList.remove('hidden');
                processFiles(webpFiles);
            }
        }

        async function processFiles(files) {
            // Show loading state on button if needed, or just process
            downloadAllBtn.disabled = true;
            downloadAllBtn.innerHTML = `<div class="loader"></div> Converting...`;

            const promises = files.map(file => convertFile(file));
            const results = await Promise.all(promises);
            
            convertedFiles = [...convertedFiles, ...results];
            updateUI();
            
            downloadAllBtn.disabled = false;
            downloadAllBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download All (ZIP)
            `;
        }

        function convertFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        
                        canvas.toBlob((blob) => {
                            const url = URL.createObjectURL(blob);
                            const newName = file.name.replace(/\.webp$/i, '.png');
                            resolve({
                                originalName: file.name,
                                newName: newName,
                                blob: blob,
                                url: url,
                                size: blob.size,
                                originalSize: file.size,
                                width: img.width,
                                height: img.height
                            });
                        }, 'image/png');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function updateUI() {
            fileCountLabel.textContent = convertedFiles.length;
            gallery.innerHTML = '';

            convertedFiles.forEach((file, index) => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in flex flex-col';
                
                const savings = ((file.originalSize - file.size) / file.originalSize * 100).toFixed(1);
                const savingsColor = savings > 0 ? 'text-green-600' : 'text-amber-600';
                const savingsIcon = savings > 0 ? '↓' : '↑';
                const savingsText = savings > 0 ? `${savingsIcon} ${Math.abs(savings)}% smaller` : `${savingsIcon} ${Math.abs(savings)}% larger`;

                card.innerHTML = `
                    <div class="relative aspect-video bg-slate-100 group cursor-pointer" onclick="previewImage('${file.url}')">
                        <img src="${file.url}" class="w-full h-full object-contain" alt="Preview">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center opacity-0 group-hover:opacity-100">
                            <span class="bg-white/90 text-slate-800 px-3 py-1 rounded-full text-xs font-semibold shadow-sm">Click to Preview</span>
                        </div>
                    </div>
                    <div class="p-4 flex-grow flex flex-col justify-between">
                        <div>
                            <h4 class="font-semibold text-slate-800 text-sm truncate mb-1" title="${file.newName}">${file.newName}</h4>
                            <div class="flex items-center gap-2 text-xs text-slate-500 mb-3">
                                <span>${file.width}×${file.height}</span>
                                <span>•</span>
                                <span>${formatBytes(file.size)}</span>
                            </div>
                            <div class="text-xs font-medium ${savingsColor} bg-slate-50 inline-block px-2 py-1 rounded mb-3">
                                ${savingsText} vs WEBP
                            </div>
                        </div>
                        <button onclick="downloadSingle('${file.url}', '${file.newName}')" 
                            class="w-full mt-2 py-2 px-4 bg-white border border-slate-300 hover:border-indigo-500 hover:text-indigo-600 text-slate-700 text-sm font-medium rounded-lg transition-colors flex items-center justify-center gap-2 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 group-hover:text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            Download PNG
                        </button>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // Global functions for inline onclick handlers
        window.downloadSingle = function(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.previewImage = function(url) {
            // Simple preview in new tab, or you could implement a modal
            window.open(url, '_blank');
        };

        // Download All as ZIP
        downloadAllBtn.addEventListener('click', async () => {
            if (convertedFiles.length === 0) return;
            
            const btnContent = downloadAllBtn.innerHTML;
            downloadAllBtn.disabled = true;
            downloadAllBtn.innerHTML = `<div class="loader"></div> Zipping...`;

            const zip = new JSZip();
            convertedFiles.forEach(file => {
                zip.file(file.newName, file.blob);
            });

            const content = await zip.generateAsync({type: 'blob'});
            const zipUrl = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = zipUrl;
            a.download = 'converted-images.zip';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(zipUrl);

            downloadAllBtn.disabled = false;
            downloadAllBtn.innerHTML = btnContent;
        });

        // Clear All
        clearBtn.addEventListener('click', () => {
            convertedFiles = [];
            fileInput.value = '';
            gallery.innerHTML = '';
            controls.classList.add('hidden');
            fileCountLabel.textContent = '0';
        });

    </script>
</body>
</html>
